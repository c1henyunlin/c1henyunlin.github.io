<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #f6f8fa; padding: 40px 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 4px solid #fff; box-shadow: 0 4px 12px #00000010; }
        h1 { font-size: 28px; margin-bottom: 10px; color: #222; }
        .bio { font-size: 16px; color: #555; margin-bottom: 24px; line-height: 1.6; }
        .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
        .links a { padding: 10px 18px; background: #fff; border-radius: 8px; text-decoration: none; color: #333; box-shadow: 0 2px 8px #00000008; transition: .2s; }
        .links a:hover { background: #f0f0f0; }
        .skills { margin-bottom: 30px; }
        .skills span { background: #e9f5ff; color: #0066cc; padding: 6px 12px; border-radius: 20px; margin: 4px; display: inline-block; font-size: 14px; }
        .footer { color: #888; font-size: 14px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <img class="avatar" src="https://picsum.photos/200/200" alt="头像">
        <h1>陈云霖</h1>
        <p class="bio">一名热爱技术的学习者 / 开发者 / 设计师</p>

        <div class="skills">
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
            <span>AI 工具</span>
        </div>

        <div class="links">
            <a href="https://github.com/c1henyunlin" target="_blank">GitHub</a>
            <a href="javascript:void(0)" onclick="showEmail()" class="email-link">邮箱</a>
        </div>

        <div id="emailDisplay" style="display: none; margin-top: 10px; padding: 10px; background: #e8f4f8; border-radius: 8px; font-family: monospace;"></div>

        <div class="footer">© 2025 我的个人主页</div>
    </div>

    <script>
        function showEmail() {
            const email = '2748393634@qq.com';
            const emailDisplay = document.getElementById('emailDisplay');
            emailDisplay.textContent = email;
            emailDisplay.style.display = 'block';
            
            // 复制到剪贴板（如果浏览器支持）
            if (navigator.clipboard) {
                navigator.clipboard.writeText(email).then(() => {
                    setTimeout(() => {
                        emailDisplay.textContent = email + ' (已复制到剪贴板)';
                    }, 100);
                });
            }
        }
    </script>
</body>
</html>
